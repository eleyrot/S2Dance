<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impressionen | S²Dance</title>
    <meta name="description" content="Bilder vergangener Hochzeiten und Events von S²Dance – Stefan Engler & Silvan Inauen.">
    <link rel="canonical" href="https://www.s2dance.ch/impressionen/">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Impressionen | S²Dance">
    <meta property="og:description" content="Bilder vergangener Hochzeiten und Events von S²Dance – Stefan Engler & Silvan Inauen.">
    <meta property="og:url" content="https://www.s2dance.ch/impressionen/">

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">

    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "EntertainmentBusiness",
        "@id": "https://www.s2dance.ch/#organization",
        "name": "S²Dance",
        "url": "https://www.s2dance.ch/impressionen/",
        "description": "Bilder vergangener Hochzeiten und Events von S²Dance – Stefan Engler & Silvan Inauen, zwei DJs aus St. Gallen und der Ostschweiz.",
        "telephone": "+41797702444",
        "areaServed": { "@type": "Place", "name": "Ostschweiz" },
        "address": { "@type": "PostalAddress", "addressLocality": "St. Gallen", "addressCountry": "CH" },
        "founder": [
            { "@type": "Person", "name": "Stefan Engler" },
            { "@type": "Person", "name": "Silvan Inauen" }
        ],
        "sameAs": [
            "https://www.instagram.com/S2DANCE_/"
        ]
    }
    </script>

    <style>
        :root { --gold: #D4AF37; --dark: #050505; --gray: #888; --border: rgba(255, 255, 255, 0.08); }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--dark);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.5;
        }

        .page-header { text-align: center; padding: 50px 20px 20px; }
        .eyebrow { color: var(--gold); text-transform: uppercase; letter-spacing: 3px; font-size: 0.85rem; font-weight: 600; margin-bottom: 10px; }
        .page-title { font-size: 2.2rem; font-weight: 700; }

        .back-link { display: block; text-align: center; color: var(--gray); font-size: 0.9rem; text-decoration: none; padding: 30px 20px 60px; }
        .back-link:hover { color: var(--gold); }

        .sr-only {
            position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
            overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
        }

        #s2dance-impressionen {
            font-family: 'Outfit', sans-serif;
            color: white;
            margin: 0;
            overflow-x: hidden;
        }

        #s2dance-impressionen .event-container { margin-bottom: 40px; }
        #s2dance-impressionen .event-title {
            margin: 0 0 15px 20px; font-size: 1.4rem; color: #D4AF37;
            text-transform: uppercase; letter-spacing: 2px;
            border-left: 3px solid #D4AF37; padding-left: 15px;
        }

        #s2dance-impressionen .slider-wrapper {
            width: 100%; overflow: hidden; position: relative;
            mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
            cursor: grab;
            touch-action: pan-y;
        }

        #s2dance-impressionen .slider-track {
            display: flex; gap: 20px; padding: 10px 20px;
            width: max-content;
            will-change: transform;
        }

        #s2dance-impressionen .img-card {
            height: 70vh; max-height: 800px; min-height: 450px;
            border-radius: 15px;
            filter: grayscale(0%);
            transition: filter 0.6s ease, transform 0.3s ease;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.1);
        }

        @media (hover: hover) {
            #s2dance-impressionen .img-card {
                filter: grayscale(100%);
            }
            #s2dance-impressionen .img-card:hover {
                filter: grayscale(0%);
                transform: scale(1.02);
                border-color: #D4AF37;
            }
        }

        @media (max-width: 768px) {
            #s2dance-impressionen .img-card {
                height: 330px;
                min-height: 330px;
                filter: grayscale(0%);
            }
            #s2dance-impressionen .event-container { margin-bottom: 35px; }
            #s2dance-impressionen .event-title { font-size: 1.2rem; }
            .page-title { font-size: 1.7rem; }
        }

        #s2d-loader { text-align: center; padding: 100px; color: #D4AF37; font-size: 1.2rem; }
    </style>
</head>
<body>
    <header class="page-header">
        <p class="eyebrow">Impressionen</p>
        <h1 class="page-title">Momente von S²Dance</h1>
    </header>

    <div id="s2dance-impressionen">
        <div id="s2d-loader">Momente werden geladen...</div>
        <div id="s2d-content"></div>
    </div>

    <a href="/" class="back-link">← Zurück zur Startseite</a>

    <script>
    (function() {
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyBtbB6Tw5S5MTk_Gk_GgF_JahS9OqKvkhaSgsKsV9PSoGot2S_XH3TkMZfw7XG9kYf/exec";

        fetch(SCRIPT_URL)
            .then(r => r.json())
            .then(render)
            .catch(() => {
                document.getElementById('s2d-loader').innerText = "Fehler beim Laden.";
            });

        function render(events) {
            const loader = document.getElementById('s2d-loader');
            const content = document.getElementById('s2d-content');
            if (!events || events.length === 0) {
                loader.innerText = "Keine Bilder gefunden.";
                return;
            }
            loader.style.display = 'none';

            events.forEach((event, index) => {
                const section = document.createElement('div');
                section.className = 'event-container';
                const cleanName = event.name.replace(/^\d+_/, '').replace(/_/g, ' ');

                section.innerHTML = `
                    <div class="event-title">${cleanName}</div>
                    <div class="slider-wrapper" id="s2d-wrapper-${index}">
                        <div class="slider-track" id="s2d-track-${index}"></div>
                    </div>
                `;
                content.appendChild(section);

                const track = document.getElementById(`s2d-track-${index}`);
                const wrapper = document.getElementById(`s2d-wrapper-${index}`);

                const imgHTML = event.images.map(id =>
                    `<img src="https://drive.google.com/thumbnail?id=${id}&sz=w1200" class="img-card" onmouseover="this.style.filter='grayscale(0%)'" onmouseout="this.style.filter='grayscale(100%)'">`
                ).join('');

                track.innerHTML = imgHTML + imgHTML + imgHTML;
                initDraggable(wrapper, track);
            });
        }

        function initDraggable(wrapper, track) {
            let isDown = false;
            let startX;
            let xPos = 0;
            let speed = 0.6;

            function step() {
                if (!isDown) {
                    xPos -= speed;
                    if (Math.abs(xPos) >= track.scrollWidth / 3) {
                        xPos = 0;
                    }
                    track.style.transform = `translateX(${xPos}px)`;
                }
                requestAnimationFrame(step);
            }
            requestAnimationFrame(step);

            wrapper.addEventListener('mousedown', (e) => {
                isDown = true;
                startX = e.pageX - xPos;
                wrapper.style.cursor = 'grabbing';
            });
            window.addEventListener('mouseup', () => {
                isDown = false;
                wrapper.style.cursor = 'grab';
            });
            wrapper.addEventListener('mousemove', (e) => {
                if (!isDown) return;
                e.preventDefault();
                xPos = e.pageX - startX;
                track.style.transform = `translateX(${xPos}px)`;
            });

            wrapper.addEventListener('touchstart', (e) => {
                isDown = true;
                startX = e.touches[0].pageX - xPos;
            });
            wrapper.addEventListener('touchend', () => isDown = false);
            wrapper.addEventListener('touchmove', (e) => {
                if (!isDown) return;
                xPos = e.touches[0].pageX - startX;
                track.style.transform = `translateX(${xPos}px)`;
            });
        }
    })();
    </script>
</body>
</html>
